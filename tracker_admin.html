<script>
/* ════════════════════════════════════════════════════════════
   Firebase 설정
════════════════════════════════════════════════════════════ */
const FB_DB     = 'https://esl-weekly-report-default-rtdb.asia-southeast1.firebasedatabase.app';
const FB_SECRET = 'HRsPR80bFHi6RlgxSf22DWdYOcDok78Obg2dPyWC';
const FB_PATH   = '/ai-tracker';
const BOOTSTRAP_CODE = 'tracker_admin_2026';
const INIT_PW   = 'thffndpa2026';

const ADMIN_AUTH_KEY   = 'tracker_admin_auth';
const ADMIN_EMAIL_KEY  = 'tracker_admin_email';

/* ── Firebase REST ─────────────────────────────────────── */
async function fbGet(path) {
  const r = await fetch(`${FB_DB}${path}.json?auth=${FB_SECRET}`);
  return r.ok ? r.json() : null;
}
async function fbSet(path, data) {
  const r = await fetch(`${FB_DB}${path}.json?auth=${FB_SECRET}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  return r.ok;
}
async function fbDelete(path) {
  const r = await fetch(`${FB_DB}${path}.json?auth=${FB_SECRET}`, { method:'DELETE' });
  return r.ok;
}

/* ── SHA-256 ───────────────────────────────────────────── */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function emailKey(e) { return e.replace(/[@.]/g,'_'); }
function isStrongPw(pw) {
  return pw.length>=8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && /[!@#$%^&*()\-_=+\[\]{};':",.<>?/\\|`~]/.test(pw);
}

/* ── Toast ─────────────────────────────────────────────── */
function toast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = 'toast toast-'+(type==='ok'?'ok':'err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

/* ── 탭 전환 ────────────────────────────────────────────── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

/* ════════════════════════════════════════════════════════════
   인증
════════════════════════════════════════════════════════════ */
async function adminLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pw    = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  errEl.style.display='none';
  if (!email||!pw){errEl.textContent='이메일과 비밀번호를 입력해주세요.';errEl.style.display='block';return;}
  btn.textContent='확인 중...';btn.disabled=true;
  try {
    const acc = await fbGet(`${FB_PATH}/admins/${emailKey(email)}`);
    if (!acc){errEl.textContent='등록되지 않은 어드민 계정입니다.';errEl.style.display='block';btn.textContent='로그인';btn.disabled=false;return;}
    const hash = await sha256(pw);
    if (hash!==acc.passwordHash){errEl.textContent='비밀번호가 일치하지 않습니다.';errEl.style.display='block';btn.textContent='로그인';btn.disabled=false;return;}
    sessionStorage.setItem(ADMIN_AUTH_KEY,'true');
    sessionStorage.setItem(ADMIN_EMAIL_KEY,email);
    showApp();
  } catch(e){errEl.textContent='네트워크 오류가 발생했습니다.';errEl.style.display='block';btn.textContent='로그인';btn.disabled=false;}
}

function adminLogout() {
  sessionStorage.removeItem(ADMIN_AUTH_KEY);
  sessionStorage.removeItem(ADMIN_EMAIL_KEY);
  location.reload();
}

/* ════════════════════════════════════════════════════════════
   부트스트랩
════════════════════════════════════════════════════════════ */
async function bootstrapAdmin() {
  const code  = document.getElementById('bs-code').value;
  const email = document.getElementById('bs-email').value.trim().toLowerCase();
  const pw    = document.getElementById('bs-pw').value;
  const errEl = document.getElementById('bs-err2');
  errEl.style.display='none';
  if (code!==BOOTSTRAP_CODE){errEl.textContent='부트스트랩 코드가 올바르지 않습니다.';errEl.style.display='block';return;}
  if (!email){errEl.textContent='이메일을 입력해주세요.';errEl.style.display='block';return;}
  if (!isStrongPw(pw)){errEl.textContent='비밀번호는 8자 이상, 영문·숫자·특수문자를 포함해야 합니다.';errEl.style.display='block';return;}
  const hash = await sha256(pw);
  const ok = await fbSet(`${FB_PATH}/admins/${emailKey(email)}`,{email,passwordHash:hash,createdAt:new Date().toISOString()});
  if (ok){
    sessionStorage.setItem(ADMIN_AUTH_KEY,'true');
    sessionStorage.setItem(ADMIN_EMAIL_KEY,email);
    showApp();
  } else {
    errEl.textContent='저장 실패 — Firebase 연결을 확인해주세요.';errEl.style.display='block';
  }
}

/* ════════════════════════════════════════════════════════════
   앱 초기화
════════════════════════════════════════════════════════════ */
async function showApp() {
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('bootstrap-overlay').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('header-email').textContent = sessionStorage.getItem(ADMIN_EMAIL_KEY)||'';
  await Promise.all([loadRecords(), loadUsers(), loadAdmins()]);
}

(async function init() {
  // 어드민 존재 여부 확인
  const admins = await fbGet(`${FB_PATH}/admins`);
  if (!admins || Object.keys(admins).length===0) {
    document.getElementById('bootstrap-overlay').style.display='flex';
    return;
  }
  // 이미 로그인된 경우
  if (sessionStorage.getItem(ADMIN_AUTH_KEY)==='true') {
    showApp();
    return;
  }
  document.getElementById('login-overlay').style.display='flex';
})();

/* ════════════════════════════════════════════════════════════
   레코드 관리
════════════════════════════════════════════════════════════ */
let cachedRecords = {};

async function loadRecords() {
  const data = await fbGet(`${FB_PATH}/records`);
  cachedRecords = data || {};
  renderRecords();
}

function renderRecords() {
  const el = document.getElementById('records-list');
  const entries = Object.entries(cachedRecords).sort((a,b)=>b[0].localeCompare(a[0]));
  document.getElementById('rec-count').textContent = `(${entries.length}건)`;
  if (!entries.length){el.innerHTML='<div class="empty-state">저장된 레코드가 없습니다</div>';return;}
  el.innerHTML = entries.map(([date, rec]) => {
    const total = (co) => {
      let t=0;
      ['gemini','chatgpt','claude'].forEach(ai=>{ if(rec[ai]) Object.values(rec[ai]).forEach(v=>t+=v); });
      return t;
    };
    const aiChips = ['gemini','chatgpt','claude'].map(ai => {
      const hasData = rec[ai] && Object.keys(rec[ai]).length > 0;
      const colors = {gemini:'background:rgba(26,186,123,0.18);color:#34d399;border:1px solid rgba(26,186,123,0.3)',
        chatgpt:'background:rgba(16,163,127,0.18);color:#2dd4bf;border:1px solid rgba(16,163,127,0.3)',
        claude:'background:rgba(139,43,226,0.18);color:#c084fc;border:1px solid rgba(139,43,226,0.3)'};
      const labels = {gemini:'Gemini', chatgpt:'ChatGPT', claude:'Claude'};
      return hasData
        ? `<span class="rec-ai-chip" style="${colors[ai]}">${labels[ai]}</span>`
        : `<span class="rec-ai-chip" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.1)">${labels[ai]} —</span>`;
    }).join('');
    const note = rec.note ? `<span style="margin-left:8px;font-size:0.68rem;color:rgba(255,255,255,0.3)">${rec.note.substring(0,60)}${rec.note.length>60?'…':''}</span>` : '';
    return `
      <div class="rec-row">
        <span class="rec-date">${date}</span>
        <div class="rec-ais">${aiChips}</div>
        <div class="rec-meta">질문 ${rec.questions||50}개${note}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord('${date}')">삭제</button>
      </div>`;
  }).join('');
}

async function addRecord() {
  const date     = document.getElementById('rec-date').value;
  const questions= parseInt(document.getElementById('rec-questions').value)||50;
  const note     = document.getElementById('rec-note').value.trim();
  const errEl    = document.getElementById('rec-add-err');
  errEl.style.display='none';

  if (!date){errEl.textContent='날짜를 선택해주세요.';errEl.style.display='block';return;}

  function parseAI(id) {
    const val = document.getElementById(id).value.trim();
    if (!val) return null;
    try { return JSON.parse(val); }
    catch(e) { throw new Error(`${id} JSON 형식 오류: ${e.message}`); }
  }

  let gemini, chatgpt, claude;
  try {
    gemini  = parseAI('rec-gemini');
    chatgpt = parseAI('rec-chatgpt');
    claude  = parseAI('rec-claude');
  } catch(e) {
    errEl.textContent=e.message; errEl.style.display='block'; return;
  }
  if (!gemini && !chatgpt && !claude){errEl.textContent='최소 하나의 AI 데이터를 입력해주세요.';errEl.style.display='block';return;}

  const rec = { date, questions };
  if (note) rec.note = note;
  if (gemini)  rec.gemini  = gemini;
  if (chatgpt) rec.chatgpt = chatgpt;
  if (claude)  rec.claude  = claude;

  const ok = await fbSet(`${FB_PATH}/records/${date}`, rec);
  if (ok) {
    toast(`${date} 레코드가 저장되었습니다`);
    ['rec-gemini','rec-chatgpt','rec-claude','rec-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('rec-date').value='';
    await loadRecords();
  } else {
    errEl.textContent='저장 실패 — Firebase 연결을 확인해주세요.'; errEl.style.display='block';
  }
}

async function deleteRecord(date) {
  if (!confirm(`${date} 레코드를 삭제하시겠습니까?`)) return;
  const ok = await fbDelete(`${FB_PATH}/records/${date}`);
  if (ok) { toast(`${date} 레코드 삭제됨`); await loadRecords(); }
  else toast('삭제 실패','err');
}

/* ════════════════════════════════════════════════════════════
   사용자 계정 관리
════════════════════════════════════════════════════════════ */
let cachedUsers = {};

async function loadUsers() {
  cachedUsers = await fbGet(`${FB_PATH}/accounts`) || {};
  renderUsers();
}

function renderUsers() {
  const el = document.getElementById('users-table');
  const entries = Object.entries(cachedUsers);
  if (!entries.length){el.innerHTML='<div class="empty-state">등록된 사용자가 없습니다</div>';return;}
  el.innerHTML = `<table class="tbl">
    <thead><tr><th>이메일</th><th>생성일</th><th>액션</th></tr></thead>
    <tbody>${entries.map(([k,u])=>`
      <tr>
        <td><span class="badge badge-user">USER</span> <span style="margin-left:6px">${u.email}</span></td>
        <td style="color:rgba(255,255,255,0.45)">${u.createdAt?u.createdAt.substring(0,10):'—'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-warn btn-sm" onclick="resetUserPw('${k}','${u.email}')">비밀번호 초기화</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${k}','${u.email}')">삭제</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function createUser() {
  const email = document.getElementById('new-user-email').value.trim().toLowerCase();
  if (!email){toast('이메일을 입력해주세요','err');return;}
  const hash = await sha256(email + ':' + INIT_PW);
  const ok = await fbSet(`${FB_PATH}/accounts/${emailKey(email)}`,{email,passwordHash:hash,mustChangePassword:true,createdAt:new Date().toISOString()});
  if (ok){toast(`${email} 계정이 생성되었습니다`);document.getElementById('new-user-email').value='';await loadUsers();}
  else toast('생성 실패','err');
}

async function resetUserPw(key, email) {
  if (!confirm(`${email} 비밀번호를 초기화하시겠습니까?`)) return;
  const hash = await sha256(email + ':' + INIT_PW);
  const ok = await fbSet(`${FB_PATH}/accounts/${key}`, {
    ...cachedUsers[key],
    passwordHash: hash,
    mustChangePassword: true,
    failedAttempts: 0,
    lockUntil: null
  });
  if (ok) toast(`${email} 비밀번호가 초기화되었습니다`);
  else toast('초기화 실패','err');
}

async function deleteUser(key, email) {
  if (!confirm(`${email} 계정을 삭제하시겠습니까?`)) return;
  const ok = await fbDelete(`${FB_PATH}/accounts/${key}`);
  if (ok){toast(`${email} 계정 삭제됨`);await loadUsers();}
  else toast('삭제 실패','err');
}

/* ════════════════════════════════════════════════════════════
   어드민 계정 관리
════════════════════════════════════════════════════════════ */
let cachedAdmins = {};

async function loadAdmins() {
  cachedAdmins = await fbGet(`${FB_PATH}/admins`) || {};
  renderAdmins();
}

function renderAdmins() {
  const el = document.getElementById('admins-table');
  const entries = Object.entries(cachedAdmins);
  const myEmail = sessionStorage.getItem(ADMIN_EMAIL_KEY)||'';
  if (!entries.length){el.innerHTML='<div class="empty-state">등록된 어드민이 없습니다</div>';return;}
  el.innerHTML = `<table class="tbl">
    <thead><tr><th>이메일</th><th>생성일</th><th>액션</th></tr></thead>
    <tbody>${entries.map(([k,a])=>`
      <tr>
        <td><span class="badge badge-admin">ADMIN</span> <span style="margin-left:6px">${a.email}</span>
          ${a.email===myEmail?'<span style="font-size:0.65rem;color:rgba(255,255,255,0.3);margin-left:6px">(나)</span>':''}</td>
        <td style="color:rgba(255,255,255,0.45)">${a.createdAt?a.createdAt.substring(0,10):'—'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-warn btn-sm" onclick="resetAdminPw('${k}','${a.email}')">비밀번호 초기화</button>
          ${a.email!==myEmail?`<button class="btn btn-danger btn-sm" onclick="deleteAdmin('${k}','${a.email}')">삭제</button>`:''}
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function createAdmin() {
  const email = document.getElementById('new-admin-email').value.trim().toLowerCase();
  if (!email){toast('이메일을 입력해주세요','err');return;}
  const hash = await sha256(email + ':' + INIT_PW);
  const ok = await fbSet(`${FB_PATH}/admins/${emailKey(email)}`,{email,passwordHash:hash,mustChangePassword:true,createdAt:new Date().toISOString()});
  if (ok){toast(`${email} 어드민이 생성되었습니다`);document.getElementById('new-admin-email').value='';await loadAdmins();}
  else toast('생성 실패','err');
}

async function resetAdminPw(key, email) {
  if (!confirm(`${email} 비밀번호를 초기화하시겠습니까?`)) return;
  const hash = await sha256(email + ':' + INIT_PW);
  const ok = await fbSet(`${FB_PATH}/admins/${key}`, {
    ...cachedAdmins[key],
    passwordHash: hash,
    mustChangePassword: true,
    failedAttempts: 0,
    lockUntil: null
  });
  if (ok) toast(`${email} 비밀번호가 초기화되었습니다`);
  else toast('초기화 실패','err');
}

async function deleteAdmin(key, email) {
  const myEmail = sessionStorage.getItem(ADMIN_EMAIL_KEY)||'';
  if (email===myEmail){toast('자신의 계정은 삭제할 수 없습니다','err');return;}
  if (!confirm(`${email} 어드민 계정을 삭제하시겠습니까?`)) return;
  const ok = await fbDelete(`${FB_PATH}/admins/${key}`);
  if (ok){toast(`${email} 어드민 삭제됨`);await loadAdmins();}
  else toast('삭제 실패','err');
}
</script>
